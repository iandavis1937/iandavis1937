<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mean &amp; Median Duel — Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="game-page">

  <!-- ── Teacher pause banner ── -->
  <div id="pause-banner" class="pause-banner" style="display:none" aria-live="assertive">
    ⏸ Game paused by teacher
  </div>

  <!-- ── Score header ── -->
  <header class="score-header">
    <div id="p1-header" class="player-header">
      <span id="p1-name" class="player-name">Player 1</span>
      <span id="p1-role-pill" class="role-pill mean-pill">MEAN</span>
      <span id="p1-score" class="player-score">0</span>
    </div>

    <div class="center-header">
      <div id="round-info" class="round-info">Round 1 of 5</div>
      <div id="timer" class="timer">00:00</div>
    </div>

    <div id="p2-header" class="player-header player-header-right">
      <span id="p2-name" class="player-name">Player 2</span>
      <span id="p2-role-pill" class="role-pill median-pill">MEDIAN</span>
      <span id="p2-score" class="player-score">0</span>
    </div>
  </header>

  <!-- ── Role badge (my role) ── -->
  <div class="role-badge-row">
    <span id="my-role-badge" class="role-badge mean">MEAN</span>
  </div>

  <!-- ── Main game area ── -->
  <main class="game-main">

    <!-- Active / waiting section (cards + input) -->
    <section id="active-section">
      <div id="cards-container" class="cards-grid"></div>

      <!-- Choosing overlay (winner) -->
      <div id="choosing-section" class="choosing-overlay" style="display:none">
        <h2 class="choosing-title">🎉 You won!</h2>
        <p class="choosing-prompt">Which is bigger (which will give you more points)?</p>
        <div class="choice-buttons">
          <button id="btn-take-mean" class="btn btn-choice mean-choice"></button>
          <button id="btn-take-median" class="btn btn-choice median-choice"></button>
        </div>
      </div>

      <!-- Opponent choosing overlay (non-winner) -->
      <div id="opponent-choosing" class="opponent-wait" style="display:none">
        <p>Opponent is choosing their reward<span class="ellipsis">…</span></p>
      </div>

      <!-- Answer area -->
      <div class="answer-area">
        <div class="input-row">
          <span id="lock-indicator" title="Input locked by teacher" style="display:none">🔒</span>
          <input
            id="answer-input"
            type="number"
            step="0.01"
            placeholder="Your answer"
            class="answer-input"
            disabled
          />
          <button id="submit-btn" class="btn btn-primary" disabled>Submit</button>
        </div>
        <p id="answer-feedback" class="feedback" aria-live="polite"></p>
        <p id="status-msg" class="status-msg" aria-live="polite"></p>
      </div>
    </section>

    <!-- Reveal section (round_over) -->
    <section id="reveal-section" style="display:none">
      <div class="reveal-card">
        <h2 class="reveal-title">Round Result</h2>
        <div class="reveal-stats">
          <div class="reveal-stat">
            <span class="reveal-label mean-color">Mean</span>
            <span id="reveal-mean" class="reveal-value">—</span>
          </div>
          <div class="reveal-stat">
            <span class="reveal-label median-color">Median</span>
            <span id="reveal-median" class="reveal-value">—</span>
          </div>
        </div>
        <p id="reveal-winner" class="reveal-winner-text"></p>
        <p class="reveal-countdown-text">
          Next round in <span id="reveal-countdown" class="countdown-num">3</span>…
        </p>
      </div>
    </section>

    <!-- Finished section -->
    <section id="finished-section" style="display:none">
      <div class="finished-card">
        <h2 id="game-winner" class="game-winner-text"></h2>
        <div class="final-scores">
          <div class="final-score-row">
            <span id="final-p1-name" class="final-player mean-color"></span>
            <span id="final-p1-score" class="final-score-value"></span>
          </div>
          <div class="final-score-row">
            <span id="final-p2-name" class="final-player median-color"></span>
            <span id="final-p2-score" class="final-score-value"></span>
          </div>
        </div>
        <button id="play-again-btn" class="btn btn-primary" style="display:none">
          Play Again
        </button>
      </div>
    </section>

  </main>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/firebase-init.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
